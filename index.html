<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신규입사자 일정관리 시스템</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#1F2A4E; --navy2:#2A3866; --pink:#F4B7CE; --pink-strong:#EF9DBC;
  --pink-light:#FADEE6; --grey:#8E9AAD; --line:#E5E8EF; --bg:#FFFFFF;
  --text:#1A1A2E; --muted:#6B7488;
  --tip-blue:#2563EB; --tip-sky:#DCEBFF; --tip-gray:#5B6472; --tip-gray-bg:#EDEFF3;
  --st-none:#FBE0E0; --st-first:#FFF3C4; --st-both:#FFFFFF;
  --radius:14px; --shadow:0 8px 30px rgba(31,42,78,.12);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Pretendard',-apple-system,sans-serif;color:var(--text);background:#F4F6FA;font-size:14px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
.upper{font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.06em;}
.hidden{display:none !important;}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-card{width:340px;text-align:center;color:#fff;}
.login-card .logo{margin:0 auto 26px;}
.login-card h1{font-size:15px;font-weight:600;margin:0 0 4px;}
.login-card p{color:var(--pink);font-size:12px;margin:0 0 28px;}
.login-card input{width:100%;padding:13px 15px;margin-bottom:12px;border:none;border-radius:10px;background:#2A3866;color:#fff;outline:none;}
.login-card input::placeholder{color:#8892ad;}
.login-card button{width:100%;padding:13px;border:none;border-radius:10px;background:var(--pink);color:var(--navy);font-weight:700;font-size:14px;}
.login-err{color:#ff9db0;font-size:12px;height:16px;margin-bottom:8px;}

/* SHELL */
#app{display:none;min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;flex-shrink:0;background:var(--navy);color:#fff;padding:22px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;}
.sidebar .brand{display:flex;align-items:center;gap:11px;padding:0 8px 22px;}
.sidebar .brand .t{font-size:13px;font-weight:600;line-height:1.3;}
.sidebar nav{display:flex;flex-direction:column;gap:3px;flex:1;}
.sidebar nav button.navi{background:transparent;border:none;color:#c3cade;padding:11px 14px;border-radius:11px;font-size:14px;font-weight:500;text-align:left;display:flex;align-items:center;gap:10px;width:100%;}
.sidebar nav button.navi.active{background:var(--pink);color:var(--navy);font-weight:700;}
.sidebar nav button.navi:hover:not(.active){background:#28345c;color:#fff;}
.sidebar nav .subnav{display:flex;flex-direction:column;gap:2px;margin:2px 0 6px 12px;padding-left:10px;border-left:1px solid #38446e;}
.sidebar nav .subnav button{background:transparent;border:none;color:#aab2c8;text-align:left;padding:8px 12px;border-radius:9px;font-size:13px;}
.sidebar nav .subnav button.active{background:#2f3d66;color:#fff;font-weight:600;}
.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar2{height:56px;display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:0 24px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;}
.topbar2 .bell{position:relative;background:#f0f2f7;border:none;color:var(--navy);width:36px;height:36px;border-radius:50%;font-size:16px;}
.topbar2 .bell .dot{position:absolute;top:-3px;right:-3px;background:var(--pink-strong);color:var(--navy);font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.topbar2 .who{font-size:13px;color:var(--muted);font-weight:600;}
.topbar2 .logout{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:16px;padding:6px 13px;font-size:12px;}
main{padding:26px 30px 60px;max-width:1120px;width:100%;margin:0 auto;}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap;}
.page-head .label{font-size:11px;color:var(--grey);letter-spacing:.14em;margin-bottom:6px;}
.page-head h2{margin:0;font-size:22px;font-weight:700;letter-spacing:-.01em;}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:6px;display:flex;align-items:center;gap:8px;}
.count-pill{display:inline-flex;align-items:center;background:#E9ECF2;color:#1a1a2e;border-radius:20px;padding:3px 12px;font-weight:700;font-size:12px;}

.btn{border:none;border-radius:22px;padding:9px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.btn.primary{background:var(--navy);color:#fff;}
.btn.pink{background:var(--pink);color:var(--navy);}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line);}
.btn.sm{padding:6px 12px;font-size:12px;}
.btn.danger{background:#E9536B;color:#fff;}
.btn:hover{opacity:.92;}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.seg{display:inline-flex;background:#eef1f7;border-radius:22px;padding:3px;}
.seg button{border:none;background:transparent;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;color:var(--muted);}
.seg button.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}

/* FILTERS */
.filters{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:12px 15px;margin-bottom:14px;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-row+.filter-row{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
.filters input,.filters select{padding:9px 12px;border:1px solid var(--line);border-radius:20px;background:#fff;outline:none;}
.filters input:focus,.filters select:focus{border-color:var(--pink-strong);}
.filters .flabel{font-size:12px;font-weight:700;color:var(--muted);padding:0 2px;}
.combo{position:relative;}
.combo>input{width:150px;}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;min-width:190px;max-height:200px;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:60;padding:5px;}
.combo-list .ci{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--line);}
.combo-list .ci:last-child{border-bottom:none;}
.combo-list .ci:hover{background:var(--pink-light);border-radius:8px;}
.combo-list .none{padding:8px 12px;color:var(--muted);font-size:12px;}
.date-parts{display:flex;gap:6px;align-items:center;}
.date-parts select{border-radius:16px;padding:8px 10px;}
.cal-btn{border:1px solid var(--line);background:#fff;border-radius:16px;padding:8px 11px;font-size:14px;}
.date-hidden{position:absolute;width:1px;height:1px;opacity:0;padding:0;border:0;pointer-events:none;}
.xfilter{display:flex;gap:6px;align-items:center;background:#f7f8fc;border:1px solid var(--line);border-radius:20px;padding:3px 3px 3px 4px;}
.xfilter select,.xfilter input{border:none;background:transparent;padding:6px 8px;}
.xfilter .rmx{border:none;background:#e6e9f1;color:var(--muted);width:22px;height:22px;border-radius:50%;font-size:13px;}

/* SPREADSHEET */
.sheet{width:100%;border-collapse:collapse;}
.sheet th{background:#fafbfd;text-align:left;font-size:12px;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);}
.sheet td{padding:12px 14px;border-bottom:1px solid #eef1f6;font-size:13px;}
.sheet tr.person{cursor:pointer;}
.sheet tr.person:hover td{background:rgba(244,183,206,.14) !important;}
.sheet tr.st-none td{background:var(--st-none);}
.sheet tr.st-first td{background:var(--st-first);}
.sheet tr.st-both td{background:var(--st-both);}
.sheet tr.group td{background:var(--navy);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;}
.sheet tr.group .cnt{color:var(--pink);font-weight:600;margin-left:8px;font-size:12px;}
.name-cell{font-weight:700;}
.mini-checks{display:inline-flex;gap:5px;margin-left:8px;vertical-align:middle;}
.mini-checks span{font-size:10px;padding:2px 6px;border-radius:10px;border:1px solid var(--line);color:var(--muted);cursor:pointer;}
.mini-checks span:hover{border-color:var(--navy);}
.mini-checks span.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.empty{padding:60px 20px;text-align:center;color:var(--muted);}
.empty .big{font-size:32px;margin-bottom:10px;}

/* CALENDAR */
.cal-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.cal-head h3{margin:0;font-size:18px;font-weight:700;min-width:150px;text-align:center;}
.cal-head button{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:15px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;gap:1px;}
.cal-dow{background:#fafbfd;text-align:center;padding:9px 0;font-size:12px;font-weight:600;color:var(--muted);}
.cal-cell{background:#fff;min-height:118px;padding:6px;position:relative;}
.cal-cell.other{background:#fafbfc;}
.cal-cell .dnum{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;display:inline-block;}
.cal-cell.today .dnum{background:var(--navy);color:#fff;border-radius:50%;width:22px;height:22px;text-align:center;line-height:22px;}
.cal-cell .add-day{position:absolute;top:5px;right:5px;opacity:0;border:none;background:var(--pink);color:var(--navy);width:20px;height:20px;border-radius:50%;font-size:13px;font-weight:700;padding:0;line-height:1;display:flex;align-items:center;justify-content:center;}
.cal-cell:hover .add-day{opacity:1;}
.cal-box{border-radius:8px;padding:4px 7px;margin-bottom:4px;cursor:pointer;border:1px solid rgba(0,0,0,.05);}
.cal-box.st-none{background:var(--st-none);}
.cal-box.st-first{background:var(--st-first);}
.cal-box.st-both{background:var(--st-both);border-color:var(--line);}
.cal-box .bname{font-size:12px;font-weight:700;line-height:1.3;}
.cal-box .bdept{font-size:10px;color:var(--muted);line-height:1.2;}
.cal-box .bchecks{display:flex;gap:5px;margin-top:3px;}
.cal-box .bchecks label{font-size:9px;display:flex;align-items:center;gap:2px;color:var(--muted);cursor:pointer;}
.cal-box .bchecks input{width:11px;height:11px;margin:0;accent-color:var(--navy);}
.cal-more{font-size:11px;color:var(--navy);font-weight:600;cursor:pointer;padding:2px 4px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(20,26,50,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:200;overflow:auto;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:640px;box-shadow:var(--shadow);overflow:hidden;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.modal-head h3{margin:0;font-size:17px;font-weight:700;}
.modal-head .x{border:none;background:#f0f2f7;width:30px;height:30px;border-radius:50%;font-size:16px;}
.modal-body{padding:20px 22px;max-height:70vh;overflow:auto;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}

/* record sections (unified view/edit) */
.rsec{margin-bottom:16px;}
.rsec-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.rsec-head .ic{font-size:15px;}
.rsec-head .rt{font-size:14px;font-weight:700;color:#E0508A;white-space:nowrap;letter-spacing:.01em;}
.rsec-head .rline{flex:1;height:1px;background:var(--line);}
.rsec-body{padding-left:8px;}
.email-link{color:#185FA5;text-decoration:none;}
.email-link:hover{text-decoration:underline;}
.pal-btn{border:none;background:transparent;font-size:13px;opacity:.3;margin-left:6px;padding:0 2px;vertical-align:middle;}
.drow:hover .pal-btn{opacity:.75;}
.pal{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 9px;}
.pal .pl{font-size:11px;color:var(--muted);}
.pal .sw{width:20px;height:20px;border-radius:6px;border:1px solid rgba(0,0,0,.12);font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;padding:0;}
.pal .sw.clear{background:#f0f2f7;color:var(--muted);}
.field-menu-wrap{margin-left:auto;display:inline-flex;align-items:center;gap:4px;}
.field .dots{opacity:0;border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px;line-height:1;}
.field:hover .dots{opacity:.6;}
.field .dots:hover{opacity:1;}
.fdot{width:9px;height:9px;border-radius:50%;display:none;border:1px solid rgba(0,0,0,.18);}
.fmenu{position:absolute;right:0;top:24px;z-index:6;display:flex;align-items:center;gap:5px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 9px;box-shadow:var(--shadow);width:max-content;max-width:290px;}
.fmenu .pl{font-size:11px;color:var(--muted);}
.fmenu .sw{width:20px;height:20px;border-radius:6px;border:1px solid rgba(0,0,0,.12);font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;padding:0;}
.fmenu .sw.clear{background:#f0f2f7;color:var(--muted);}
.drow{display:flex;padding:8px 2px;border-bottom:1px dashed #eef1f6;font-size:13px;}
.drow:last-child{border-bottom:none;}
.drow .k{width:130px;color:#9AA1B0;flex-shrink:0;}
.drow .v{flex:1;word-break:break-word;white-space:pre-line;color:var(--navy);font-weight:500;position:relative;}
.mask{cursor:pointer;color:var(--navy);font-weight:600;background:#eef1f7;padding:1px 8px;border-radius:8px;font-size:12px;}
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;}
.badge.gray{background:#eef1f6;color:var(--muted);}
.badge.pink{background:var(--pink-light);color:#b0466a;}
.badge.navy{background:var(--navy);color:#fff;}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;position:relative;}
.field:last-child{margin-bottom:0;}
.field label{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.field label .req{color:var(--pink-strong);}
.field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:9px;outline:none;background:#fff;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pink-strong);}
.field textarea{resize:none;overflow:hidden;min-height:42px;}
.salary-wrap{display:flex;gap:6px;align-items:center;}
.salary-wrap input{flex:1;}
.salary-wrap .unit{color:var(--grey);font-size:12px;white-space:nowrap;}
.tip-btn{border:none;font-size:10px;font-weight:700;padding:3px 8px;border-radius:11px;letter-spacing:.03em;background:var(--tip-gray-bg);color:var(--tip-gray);}
.tip-btn.has{background:var(--tip-sky);color:var(--tip-blue);}
.tip-box{background:#f4f9ff;border:1px solid var(--tip-sky);border-radius:9px;padding:10px 12px;font-size:12px;color:#3a4a63;line-height:1.55;}
.tip-box .tip-text{white-space:pre-line;}
.tip-box .tip-actions{margin-top:8px;display:flex;gap:6px;}
.tip-box .mini{border:none;font-size:11px;font-weight:700;padding:4px 10px;border-radius:9px;}
.tip-box .mini.edit{background:var(--tip-sky);color:var(--tip-blue);}
.tip-box .mini.save{background:var(--navy);color:#fff;}
.tip-box .mini.cancel{background:#eef1f6;color:var(--muted);}
.tip-box textarea{width:100%;border:1px solid var(--tip-sky);border-radius:8px;padding:8px;font-size:12px;min-height:80px;resize:vertical;}
.chip-group{display:flex;gap:8px;flex-wrap:wrap;}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--muted);}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.chk{display:flex;gap:16px;align-items:center;padding:2px 0;}
.chk label{display:flex;align-items:center;gap:7px;font-weight:600;cursor:pointer;}
.chk input{width:16px;height:16px;accent-color:var(--navy);}

/* list (email/dept) */
.list-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #eef1f6;background:#fff;}
.list-row:last-child{border-bottom:none;}
.list-row .grow{flex:1;}
.list-row .lname{font-weight:700;}
.list-row .lsub{color:var(--muted);font-size:12px;}
.list-row.drag{cursor:grab;}
.list-row.dragging{opacity:.4;}
.list-row .handle{color:#c2c8d6;font-size:16px;cursor:grab;user-select:none;}
.dept-group-head{background:var(--navy);color:#fff;font-weight:700;font-size:12px;padding:8px 16px;}
.dept-group-head .c{color:var(--pink);margin-left:8px;font-size:11px;}
.inline-add{display:flex;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;background:#fafbfd;}
.inline-add input{padding:9px 12px;border:1px solid var(--line);border-radius:9px;flex:1;min-width:120px;}

/* notifications */
.folder-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.fchip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;}
.fchip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.fchip .del{border:none;background:transparent;color:inherit;opacity:.6;font-size:12px;padding:0;}
.log-row{display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid #eef1f6;align-items:flex-start;}
.log-row .ic{width:34px;height:34px;border-radius:50%;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.log-row .ic.add{background:#d9f2e4;} .log-row .ic.edit{background:#fdefc7;} .log-row .ic.del{background:#f8d6dc;} .log-row .ic.login{background:#dbe4fb;}
.log-row .lmain{flex:1;font-size:13px;}
.log-row .lmain b{font-weight:700;}
.log-row .ltime{color:var(--muted);font-size:11px;white-space:nowrap;}
.log-row .ldetail{color:var(--muted);font-size:12px;margin-top:2px;}
.log-row .movesel{border:1px solid var(--line);border-radius:14px;font-size:11px;padding:4px 8px;color:var(--muted);background:#fff;}

/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.stat-card .n{font-size:30px;font-weight:800;font-family:'Poppins',sans-serif;color:var(--navy);}
.stat-card .t{color:var(--muted);font-size:12px;margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-row .bl{width:130px;font-size:12.5px;font-weight:600;text-align:right;color:var(--text);flex-shrink:0;}
.bar-track{flex:1;background:#eef1f6;border-radius:8px;height:20px;overflow:hidden;}
.bar-fill{height:100%;background:var(--pink-strong);border-radius:8px;}
.bar-row .bv{font-size:12px;color:var(--muted);width:34px;}

/* settings */
.set-block{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:6px 20px;margin-bottom:16px;}
.set-item{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #eef1f6;gap:12px;}
.set-item:last-child{border-bottom:none;}
.set-item .st-t{font-weight:600;} .set-item .st-d{color:var(--muted);font-size:12px;margin-top:2px;}
.switch{position:relative;width:46px;height:26px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#cfd5e2;border-radius:26px;transition:.2s;}
.slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.switch input:checked+.slider{background:var(--navy);}
.switch input:checked+.slider:before{transform:translateX(20px);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:24px;font-size:13px;z-index:500;box-shadow:var(--shadow);opacity:0;transition:.3s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:760px){.sidebar{width:66px;}.sidebar .brand .t,.sidebar nav button.navi span.lbl{display:none;}}
</style>

/* ===== HELPERS ===== */
function statusClass(p){if(p.firstDone&&p.secondDone)return'st-both';if(p.firstDone)return'st-first';return'st-none';}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function relTime(ts){const s=(Date.now()-ts)/1000;if(s<60)return'방금 전';if(s<3600)return Math.floor(s/60)+'분 전';if(s<86400)return Math.floor(s/3600)+'시간 전';return Math.floor(s/86400)+'일 전';}
function payUnit(p){return p.payType==='월급제'?'원/月':(p.payType==='연봉제'?'원':'');}
function formatComma(v){const d=String(v==null?'':v).replace(/[^0-9]/g,'');return d?d.replace(/\B(?=(\d{3})+(?!\d))/g,','):'';}
function fmtSalary(v,p){if(!v)return'';const u=payUnit(p);return formatComma(v)+(u?' '+u:'');}
function fmtDateK(d){if(d==='미정')return'입사일 미정';const dt=new Date(d+'T00:00');const wd=['일','월','화','수','목','금','토'][dt.getDay()];return `${d} (${wd})`;}
function autoGrow(el){el.style.height='auto';el.style.height=(el.scrollHeight+2)+'px';}
function sizeTextareas(){document.querySelectorAll('.modal textarea.grow-ta').forEach(autoGrow);}

function log(action,target,detail){state.logs.unshift({id:uid(),ts:Date.now(),editor:session.name||'-',action,target:target||'',detail:detail||'',folderId:null});if(state.logs.length>800)state.logs.pop();}
function diffPerson(o,n){const c=[];for(const k in FIELDS){if((o[k]||'')!==(n[k]||''))c.push(FIELDS[k].label);}['firstDone','secondDone'].forEach(k=>{if((o[k]||false)!==(n[k]||false))c.push(k==='firstDone'?'1차입력':'2차입력');});return c;}

/* ===== AUTH (Google login + Firestore realtime) ===== */
function googleLogin(){const err=document.getElementById('loginErr');if(err)err.textContent='';const p=new firebase.auth.GoogleAuthProvider();window._freshLogin=true;auth.signInWithPopup(p).catch(e=>{const el=document.getElementById('loginErr');if(el)el.textContent='로그인 실패: '+(e.code||e.message);});}
function logout(){if(dataUnsub){dataUnsub();dataUnsub=null;}settingsUnlocked=false;session={email:null,name:null,isAdmin:false};auth.signOut();}
function showLogin(){document.getElementById('app').style.display='none';const l=document.getElementById('login');l.style.display='flex';
 document.getElementById('loginBody').innerHTML=`<button onclick="googleLogin()" style="width:100%;padding:13px;border:none;border-radius:10px;background:#fff;color:#1F2A4E;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;"><span style="font-weight:800;color:#EA4335;font-family:Poppins,sans-serif;">G</span> Google로 로그인</button><div class="login-err" id="loginErr"></div><div style="color:#8892ad;font-size:12px;margin-top:14px;">허용된 구글 계정만 접속할 수 있어요.</div>`;}
function showNoAccess(user){document.getElementById('app').style.display='none';const l=document.getElementById('login');l.style.display='flex';
 document.getElementById('loginBody').innerHTML=`<div style="color:#ff9db0;font-size:13px;margin-bottom:16px;line-height:1.5">이 계정은 접근 권한이 없습니다.<br><b>${esc(user.email||'')}</b><br>관리자에게 허용 명단 추가를 요청하세요.</div><button onclick="logout()" style="width:100%;padding:12px;border:1px solid #3a4676;border-radius:10px;background:transparent;color:#c3cade;font-size:13px;cursor:pointer;">다른 계정으로 로그인</button>`;}
auth.onAuthStateChanged(async user=>{
 if(!user){showLogin();return;}
 const email=(user.email||'').toLowerCase();
 try{
   const snap=await ACCESS_DOC.get();
   let acc=snap.exists?snap.data():null;
   if(!acc){
     if(email===BOOTSTRAP_ADMIN){acc={members:[{email:BOOTSTRAP_ADMIN,name:'박혜원',admin:true}],emails:[BOOTSTRAP_ADMIN],admins:[BOOTSTRAP_ADMIN]};await ACCESS_DOC.set(acc);}
     else{showNoAccess(user);return;}
   }
   acc.members=acc.members||[];acc.emails=acc.emails||[];acc.admins=acc.admins||[];
   if(!acc.emails.includes(email)&&email!==BOOTSTRAP_ADMIN){showNoAccess(user);return;}
   accessCache=acc;session.email=email;
   const me=acc.members.find(m=>(m.email||'').toLowerCase()===email);
   session.name=me?me.name:(user.displayName||email);
   session.isAdmin=acc.admins.map(x=>(x||'').toLowerCase()).includes(email);
   startApp();
 }catch(e){document.getElementById('loginBody').innerHTML='<div style="color:#ff9db0;font-size:13px">접속 오류: '+esc(e.message||e.code)+'</div><button onclick="logout()" style="margin-top:12px;width:100%;padding:11px;border:1px solid #3a4676;border-radius:10px;background:transparent;color:#c3cade;font-size:13px;cursor:pointer;">다시 로그인</button>';}
});
function startApp(){
 document.getElementById('login').style.display='none';
 document.getElementById('app').style.display='block';
 document.getElementById('whoName').textContent=session.name+' 님';
 if(dataUnsub)dataUnsub();
 let first=true;
 dataUnsub=DATA_DOC.onSnapshot(snap=>{
   if(snap.exists)state=normState(snap.data());else{state=normState({});DATA_DOC.set(state);}
   renderNav();
   if(!document._modal)rerenderCurrent();
   if(first){first=false;if(window._freshLogin){window._freshLogin=false;log('login','','접속');save();}}
 },err=>toast('동기화 오류: '+(err.code||err.message)));
 renderNav();go('home');
}

/* filters (built once; inputs update results only) */
function renderFilters(){
 const XLABELS={rank:'직급/직책',handover:'인계자',orgLead:'조직장',empStatus:'정규직여부',nationality:'국적',note:'비고',education:'최종학력',internalMemo:'내부관리메모',status:'입력상태'};
 const years=[...new Set(state.people.map(p=>(p.joinDate||'').slice(0,4)).filter(Boolean))].sort().reverse();
 const xval=(f,i)=>{
   if(f.field==='empStatus')return `<select onchange="setXVal(${i},this.value)"><option value="">선택</option>${['정규직','계약직'].map(o=>`<option ${f.value===o?'selected':''}>${o}</option>`).join('')}</select>`;
   if(f.field==='status')return `<select onchange="setXVal(${i},this.value)"><option value="">선택</option>${['1차 입력','2차 입력','1·2차 완료','미입력'].map(o=>`<option ${f.value===o?'selected':''}>${o}</option>`).join('')}</select>`;
   return `<input placeholder="값 입력" value="${esc(f.value)}" oninput="setXVal(${i},this.value)">`;
 };
 let xrows=search.extra.map((f,i)=>`<div class="xfilter">
   <select onchange="setXField(${i},this.value)">${Object.entries(XLABELS).map(([k,l])=>`<option value="${k}" ${f.field===k?'selected':''}>${l}</option>`).join('')}</select>
   ${xval(f,i)}
   <button class="rmx" onclick="rmXFilter(${i})">×</button></div>`).join('');
 document.getElementById('filterWrap').innerHTML=`<div class="filters">
   <div class="filter-row">
     <input placeholder="🔍 이름 검색" value="${esc(search.q)}" oninput="onFilterInput('q',this.value)" style="width:160px">
     <div class="combo"><input id="flt_dept" placeholder="부서" value="${esc(search.dept)}" autocomplete="off" oninput="onComboInput('dept',this.value)" onfocus="openCombo('dept')"><div class="combo-list hidden" id="cl_dept"></div></div>
     <div class="combo"><input id="flt_type" placeholder="입사구분" value="${esc(search.type)}" autocomplete="off" oninput="onComboInput('type',this.value)" onfocus="openCombo('type')"><div class="combo-list hidden" id="cl_type"></div></div>
     <span class="flabel">입사일</span>
     <div class="date-parts">
       <select id="sel_jY" onchange="onPartFilter('Y',this.value)"><option value="">연도</option>${years.map(y=>`<option ${search.jY===y?'selected':''}>${y}</option>`).join('')}</select>
       <select id="sel_jM" onchange="onPartFilter('M',this.value)"><option value="">월</option>${Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0')).map(m=>`<option ${search.jM===m?'selected':''}>${m}</option>`).join('')}</select>
       <select id="sel_jD" onchange="onPartFilter('D',this.value)"><option value="">일</option>${Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0')).map(d=>`<option ${search.jD===d?'selected':''}>${d}</option>`).join('')}</select>
       <button class="cal-btn" title="달력에서 날짜 선택" onclick="openDateFilter()">📅</button>
       <input type="date" id="flt_date" class="date-hidden" value="${search.jDate}" onchange="onDateFilter(this.value)">
     </div>
     <button class="btn ghost sm" onclick="addXFilter()">＋ 필터</button>
     <button class="btn ghost sm" onclick="resetFilters()">초기화</button>
   </div>
   ${xrows?`<div class="filter-row">${xrows}</div>`:''}
 </div>`;
}
function onFilterInput(key,val){search[key]=val;updateResults();}
function onPartFilter(part,val){search['j'+part]=val;search.jDate='';const di=document.getElementById('flt_date');if(di)di.value='';updateResults();}
function onDateFilter(val){search.jDate=val;search.jY=search.jM=search.jD='';['jY','jM','jD'].forEach(p=>{const s=document.getElementById('sel_'+p);if(s)s.value='';});updateResults();}
function openDateFilter(){const el=document.getElementById('flt_date');if(el.showPicker){try{el.showPicker();return;}catch(e){}}el.classList.remove('date-hidden');el.style.opacity=1;el.focus();}
function addXFilter(){search.extra.push({field:'rank',value:''});renderFilters();}
function rmXFilter(i){search.extra.splice(i,1);renderFilters();updateResults();}
function setXField(i,v){search.extra[i].field=v;search.extra[i].value='';renderFilters();updateResults();}
function setXVal(i,v){search.extra[i].value=v;updateResults();}
function resetFilters(){search={q:'',dept:'',type:'',jY:'',jM:'',jD:'',jDate:'',extra:[]};renderFilters();updateResults();}
function updateResults(){const c=document.getElementById('countPill');if(c)c.textContent=filteredPeople().length+'명';if(homeMode==='sheet')renderSheet();else renderCalendar();}

/* combobox */
function comboSource(kind){return kind==='dept'?[...new Set([...state.departments,...state.people.map(p=>p.dept).filter(Boolean)])]:['경력','신입(수습급여 90% 적용 제외)','신입'];}
function openCombo(kind){renderComboList(kind);document.getElementById('cl_'+kind).classList.remove('hidden');}
function renderComboList(kind){const val=(kind==='dept'?search.dept:search.type).toLowerCase();
 const opts=comboSource(kind).filter(o=>o.toLowerCase().includes(val));
 const el=document.getElementById('cl_'+kind);if(!el)return;
 el.innerHTML=(opts.length?opts.map(o=>`<div class="ci" onmousedown="pickCombo('${kind}','${esc(o).replace(/'/g,"\\'")}')">${esc(o)}</div>`).join(''):'<div class="none">일치 항목 없음 · 직접 입력됩니다</div>');}
function onComboInput(kind,val){if(kind==='dept')search.dept=val;else search.type=val;renderComboList(kind);document.getElementById('cl_'+kind).classList.remove('hidden');updateResults();}
function pickCombo(kind,val){if(kind==='dept')search.dept=val;else search.type=val;const inp=document.getElementById('flt_'+kind);if(inp)inp.value=val;document.getElementById('cl_'+kind).classList.add('hidden');updateResults();}
document.addEventListener('mousedown',e=>{if(!e.target.closest('.combo'))document.querySelectorAll('.combo-list').forEach(l=>l.classList.add('hidden'));if(!e.target.closest('.field-menu-wrap')&&!e.target.closest('.fmenu'))document.querySelectorAll('.fmenu').forEach(m=>m.classList.add('hidden'));});

function filteredPeople(){let arr=state.people.slice();
 if(search.q){const q=search.q.toLowerCase();arr=arr.filter(p=>(p.name||'').toLowerCase().includes(q));}
 if(search.dept){const d=search.dept.toLowerCase();arr=arr.filter(p=>(p.dept||'').toLowerCase().includes(d));}
 if(search.type){const t=search.type.toLowerCase();arr=arr.filter(p=>(p.joinType||'').toLowerCase().includes(t));}
 if(search.jDate){arr=arr.filter(p=>p.joinDate===search.jDate);}
 else{if(search.jY)arr=arr.filter(p=>(p.joinDate||'').slice(0,4)===search.jY);if(search.jM)arr=arr.filter(p=>(p.joinDate||'').slice(5,7)===search.jM);if(search.jD)arr=arr.filter(p=>(p.joinDate||'').slice(8,10)===search.jD);}
 search.extra.forEach(f=>{if(f.field==='status'){
    if(f.value==='1·2차 완료')arr=arr.filter(p=>p.firstDone&&p.secondDone);
    else if(f.value==='1차 입력')arr=arr.filter(p=>p.firstDone);
    else if(f.value==='2차 입력')arr=arr.filter(p=>p.secondDone);
    else if(f.value==='미입력')arr=arr.filter(p=>!p.firstDone&&!p.secondDone);
  }else if(f.value){const v=f.value.toLowerCase();arr=arr.filter(p=>(p[f.field]||'').toLowerCase().includes(v));}});
 return arr;}

function renderSheet(){
 const arr=filteredPeople().sort((a,b)=>(b.joinDate||'').localeCompare(a.joinDate||''));
 const body=document.getElementById('homeBody');
 if(!state.people.length){body.innerHTML=`<div class="card"><div class="empty"><div class="big">🗂️</div>아직 등록된 신규입사자가 없습니다.<br>우측 상단 <b>＋ Add</b>로 추가해보세요.</div></div>`;return;}
 const groups={};arr.forEach(p=>{const d=p.joinDate||'미정';(groups[d]=groups[d]||[]).push(p);});
 const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
 let rows='';
 dates.forEach(d=>{rows+=`<tr class="group"><td colspan="7">${fmtDateK(d)}<span class="cnt">${groups[d].length}명</span></td></tr>`;
  groups[d].forEach(p=>{rows+=`<tr class="person ${statusClass(p)}" onclick="openDetail('${p.id}')">
   <td class="name-cell">${esc(p.name)}<span class="mini-checks"><span class="${p.firstDone?'on':''}" onclick="event.stopPropagation();toggleCheck('${p.id}','firstDone',${p.firstDone?'false':'true'})">1차</span><span class="${p.secondDone?'on':''}" onclick="event.stopPropagation();toggleCheck('${p.id}','secondDone',${p.secondDone?'false':'true'})">2차</span></span></td>
   <td>${esc(p.joinDate||'')}</td><td>${esc(p.dept||'')}</td><td>${esc(p.rank||'')}</td>
   <td>${esc(p.handover||'')}</td><td>${esc(p.orgLead||'')}</td><td>${esc(p.note||'')}</td></tr>`;});});
 body.innerHTML=`<div class="card"><table class="sheet"><thead><tr><th>이름</th><th>입사일</th><th>부서</th><th>직급/직책</th><th>인계자</th><th>조직장</th><th>비고</th></tr></thead><tbody>${rows||`<tr><td colspan=7><div class="empty">검색 결과가 없습니다.</div></td></tr>`}</tbody></table></div>`;
}

/* CALENDAR */
function renderCalendar(){
 const body=document.getElementById('homeBody');
 const y=calRef.getFullYear(),m=calRef.getMonth();
 const first=new Date(y,m,1),start=new Date(first);start.setDate(1-first.getDay());
 const byDate={};filteredPeople().forEach(p=>{if(p.joinDate)(byDate[p.joinDate]=byDate[p.joinDate]||[]).push(p);});
 const today=ymd(new Date());let cells='';
 for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const ds=ymd(d);const other=d.getMonth()!==m;
  const list=byDate[ds]||[];let boxes='';
  list.slice(0,3).forEach(p=>{boxes+=calBox(p);});
  if(list.length>3)boxes+=`<div class="cal-more" onclick="event.stopPropagation();openDayModal('${ds}')">+${list.length-3} 더보기</div>`;
  cells+=`<div class="cal-cell ${other?'other':''} ${ds===today?'today':''}"><span class="dnum">${d.getDate()}</span>
    <button class="add-day" title="이 날짜에 추가" onclick="openForm(null,'${ds}')">＋</button>${boxes}</div>`;}
 body.innerHTML=`<div class="cal-head"><button onclick="calMove(-1)">‹</button><h3>${y}년 ${m+1}월</h3><button onclick="calMove(1)">›</button></div>
  <div class="cal-grid">${['일','월','화','수','목','금','토'].map(w=>`<div class="cal-dow">${w}</div>`).join('')}${cells}</div>`;
}
function calBox(p){return `<div class="cal-box ${statusClass(p)}" onclick="openDetail('${p.id}')">
  <div class="bname">${esc(p.name)}</div><div class="bdept">${esc(p.dept||'')}</div>
  <div class="bchecks" onclick="event.stopPropagation()">
   <label><input type="checkbox" ${p.firstDone?'checked':''} onchange="toggleCheck('${p.id}','firstDone',this.checked)">1차</label>
   <label><input type="checkbox" ${p.secondDone?'checked':''} onchange="toggleCheck('${p.id}','secondDone',this.checked)">2차</label>
  </div></div>`;}
function calMove(n){calRef=new Date(calRef.getFullYear(),calRef.getMonth()+n,1);renderCalendar();}
function toggleCheck(id,key,val){const p=state.people.find(x=>x.id===id);if(!p)return;p[key]=val;log('edit',p.name,(key==='firstDone'?'1차 입력':'2차 입력')+' '+(val?'완료':'해제'));save();updateResults();renderNav();}
function openDayModal(ds){const list=state.people.filter(p=>p.joinDate===ds);openModal(`${fmtDateK(ds)} 입사자 (${list.length}명)`,`<div>${list.map(p=>calBox(p)).join('')}</div>`,'');}

function viewRecord(){const fresh=state.people.find(x=>x.id===curRecord.id);curRecord=Object.assign({},fresh);curRecord.styles=cloneStyles(fresh);renderRecord('view');}

function renderRecord(mode){const p=curRecord;const isNew=!p.id;
 const body=SECTIONS.map(s=>{
   const inner=s.f.map(k=>k==='__status'?statusBlock(p,mode):fieldBlock(k,p,mode)).join('');
   return `<div class="rsec"><div class="rsec-head"><span class="ic">${s.icon}</span><span class="rt">${s.t}</span><span class="rline"></span></div><div class="rsec-body">${inner}</div></div>`;

function renderAlarm(v){
 const icon={add:'➕',edit:'✏️',del:'🗑️',login:'🔓'};const cls={add:'add',edit:'edit',del:'del',login:'login'};const verb={add:'추가',edit:'수정',del:'삭제',login:'접속'};
 let logs;if(alarmFolder==='all')logs=state.logs;else if(alarmFolder==='none')logs=state.logs.filter(l=>!l.folderId);else logs=state.logs.filter(l=>l.folderId===alarmFolder);
 const chip=(id,label,cnt,delable)=>`<span class="fchip ${alarmFolder===id?'active':''}" onclick="alarmFolder='${id}';renderAlarm(document.getElementById('view'))">${label} <span style="opacity:.6">${cnt}</span>${delable?`<button class="del" onclick="event.stopPropagation();delFolder('${id}')">×</button>`:''}</span>`;
 const folderChips=chip('all','전체',state.logs.length)+chip('none','미분류',state.logs.filter(l=>!l.folderId).length)+state.logFolders.map(f=>chip(f.id,'📁 '+esc(f.name),state.logs.filter(l=>l.folderId===f.id).length,true)).join('')+`<button class="btn ghost sm" onclick="addFolder()">＋ 폴더</button>`;
 const moveOpts=l=>`<select class="movesel" onchange="moveLog('${l.id}',this.value)"><option value="">폴더 이동…</option><option value="">미분류</option>${state.logFolders.map(f=>`<option value="${f.id}" ${l.folderId===f.id?'selected':''}>${esc(f.name)}</option>`).join('')}</select>`;
 v.innerHTML=`<div class="page-head"><div><div class="label upper">Activity</div><h2>🔔 변경 이력</h2><div class="sub">누가 언제 무엇을 변경했는지 기록됩니다 <span class="count-pill">${state.logs.length}건</span></div></div>
   ${state.logs.length?`<button class="btn ghost" onclick="clearLogs()">이력 비우기</button>`:''}</div>
 <div class="folder-bar">${folderChips}</div>
 <div class="card">${logs.length?logs.map(l=>`<div class="log-row"><div class="ic ${cls[l.action]}">${icon[l.action]}</div>
   <div class="lmain"><b>${esc(l.editor)}</b> 님이 ${l.target?`<b>${esc(l.target)}</b> `:''}${verb[l.action]}${l.action==='login'?'':' 했습니다'}${l.detail?`<div class="ldetail">${esc(l.detail)}</div>`:''}<div style="margin-top:6px">${moveOpts(l)}</div></div>
   <div class="ltime" title="${new Date(l.ts).toLocaleString('ko-KR')}">${relTime(l.ts)}</div></div>`).join(''):`<div class="empty"><div class="big">🔔</div>이 폴더에 표시할 이력이 없습니다.</div>`}</div>`;
 renderNav();
}
function addFolder(){openModal('새 폴더 만들기',`<div class="field"><label>폴더 이름</label><input id="nf_name" placeholder="예: 2026년 입사, 중요"></div>`,`<button class="btn ghost" onclick="closeModal()">취소</button><button class="btn primary" onclick="createFolder()">생성</button>`);setTimeout(()=>{const el=document.getElementById('nf_name');if(el)el.focus();},50);}
function createFolder(){const n=document.getElementById('nf_name').value.trim();if(!n){toast('폴더 이름을 입력하세요.');return;}state.logFolders.push({id:uid(),name:n});save();closeModal();renderAlarm(document.getElementById('view'));toast('폴더가 생성되었습니다.');}
function delFolder(id){const f=state.logFolders.find(x=>x.id===id);if(!confirm(`'${f.name}' 폴더를 삭제할까요? (안의 알림은 미분류로 이동)`))return;state.logs.forEach(l=>{if(l.folderId===id)l.folderId=null;});state.logFolders=state.logFolders.filter(x=>x.id!==id);if(alarmFolder===id)alarmFolder='all';save();renderAlarm(document.getElementById('view'));}
function moveLog(logId,folderId){const l=state.logs.find(x=>x.id===logId);if(!l)return;l.folderId=folderId||null;save();renderAlarm(document.getElementById('view'));toast('폴더로 이동했습니다.');}
function clearLogs(){if(!confirm('변경 이력을 모두 비울까요? (폴더는 유지됩니다)'))return;state.logs=[];save();renderAlarm(document.getElementById('view'));}

/* ===== STATS ===== */
function renderStats(v){
 const now=new Date();const thisM=ymd(now).slice(0,7);
 const total=state.people.length;const thisMonth=state.people.filter(p=>(p.joinDate||'').slice(0,7)===thisM).length;
 const done=state.people.filter(p=>p.firstDone&&p.secondDone).length;const pending=total-done;
 const deptCnt={};state.people.forEach(p=>{const d=p.dept||'(미지정)';deptCnt[d]=(deptCnt[d]||0)+1;});
 const deptArr=Object.entries(deptCnt).sort((a,b)=>b[1]-a[1]);const maxD=Math.max(1,...deptArr.map(d=>d[1]));
 const monCnt={};state.people.forEach(p=>{const mo=(p.joinDate||'').slice(0,7);if(mo)monCnt[mo]=(monCnt[mo]||0)+1;});
 const monArr=Object.entries(monCnt).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);const maxM=Math.max(1,...monArr.map(m=>m[1]));
 v.innerHTML=`<div class="page-head"><div><div class="label upper">Insights</div><h2>📊 통계 요약</h2><div class="sub">${now.getFullYear()}년 ${now.getMonth()+1}월 기준</div></div></div>
 <div class="stat-grid">
   <div class="stat-card"><div class="n">${thisMonth}</div><div class="t">이번 달 입사자</div></div>
   <div class="stat-card"><div class="n">${total}</div><div class="t">전체 등록 인원</div></div>
   <div class="stat-card"><div class="n">${done}</div><div class="t">입력 완료 (1·2차)</div></div>
   <div class="stat-card"><div class="n">${pending}</div><div class="t">입력 진행 중</div></div></div>
 <div class="card" style="padding:20px;margin-bottom:16px"><h4 style="margin:0 0 16px;font-size:14px">부서별 입사자</h4>
   ${deptArr.length?deptArr.map(([d,c])=>`<div class="bar-row"><div class="bl">${esc(d)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxD*100}%"></div></div><div class="bv">${c}명</div></div>`).join(''):'<div class="empty">데이터가 없습니다.</div>'}</div>
 <div class="card" style="padding:20px"><h4 style="margin:0 0 16px;font-size:14px">월별 입사 추이 (최근 6개월)</h4>
   ${monArr.length?monArr.map(([m,c])=>`<div class="bar-row"><div class="bl">${m}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxM*100}%"></div></div><div class="bv">${c}명</div></div>`).join(''):'<div class="empty">데이터가 없습니다.</div>'}</div>`;
}

/* ===== SETTINGS ===== */
function renderSettings(v){
 const sw=(key,title,desc)=>`<div class="set-item"><div><div class="st-t">${title}</div><div class="st-d">${desc}</div></div>
   <label class="switch"><input type="checkbox" ${state.settings[key]?'checked':''} onchange="setToggle('${key}',this.checked)"><span class="slider"></span></label></div>`;
 v.innerHTML=`<div class="page-head"><div><div class="label upper">Settings</div><h2>⚙️ 설정</h2></div><button class="btn ghost" onclick="logout()">로그아웃</button></div>
 <div class="set-block">
   <div class="set-item"><div><div class="st-t">👥 접근 허용 명단 <span class="count-pill">${accessCache.members.length}명</span></div><div class="st-d">이 앱에 로그인·수정할 수 있는 구글 계정이에요. ${session.isAdmin?'이름과 이메일을 입력해 추가하세요.':'관리자만 편집할 수 있어요.'}</div></div></div>
   ${session.isAdmin?`<div class="inline-add" style="border-radius:10px;margin:6px 0 10px"><input id="am_name" placeholder="이름 (예: 박혜원)"><input id="am_email" placeholder="구글 이메일"><button class="btn pink sm" onclick="addMember()">＋ 추가</button></div>`:''}
   <div id="memberRows">${memberRows()}</div>
 </div>
 <div class="set-block">
   ${sw('deleteConfirm','삭제 전 확인창','사람 삭제 시 되돌릴 수 없다는 확인창을 표시합니다.')}
   ${sw('dupDetect','동명이인 자동 감지','같은 이름 추가 시 알파벳 표기 안내창을 띄웁니다.')}
   ${sw('maskSensitive','민감정보 마스킹','상세보기에서 연봉·계좌번호를 기본 가림(●●●) 처리합니다.')}
 </div>
 <div class="set-block">
   <div class="set-item"><div><div class="st-t">💾 데이터 백업 내보내기</div><div class="st-d">모든 입사자·부서·이메일·이력·TIP을 파일 하나(.json)로 저장합니다.</div></div>
     <button class="btn primary sm" onclick="backupExport()">내보내기</button></div>
   <div class="set-item"><div><div class="st-t">📂 데이터 백업 가져오기</div><div class="st-d">백업 파일(.json)로 전체 데이터를 복원합니다. (기존 로컬 데이터를 클라우드로 옮길 때 사용)</div></div>
     <label class="btn ghost sm" style="cursor:pointer">가져오기<input type="file" accept=".json" style="display:none" onchange="backupImport(this)"></label></div>
 </div>
 <div class="set-block">
   <div class="set-item"><div><div class="st-t">현재 로그인</div><div class="st-d">이 계정 이름으로 변경 이력이 기록됩니다.</div></div>
     <div style="text-align:right"><div><span class="badge navy">${esc(session.name||'-')}</span> ${session.isAdmin?'<span class="badge pink">관리자</span>':''}</div><div style="color:var(--muted);font-size:11px;margin-top:4px">${esc(session.email||'')}</div></div></div>
 </div>`;
}
function memberRows(){if(!accessCache.members.length)return'<div class="empty">명단이 비어 있습니다.</div>';
 return accessCache.members.slice().sort((a,b)=>(b.admin?1:0)-(a.admin?1:0)).map(m=>{const adm=!!m.admin;const e=esc(m.email).replace(/'/g,"\\'");return `<div class="list-row">
   <div class="grow"><div class="lname">${esc(m.name||'')} ${adm?'<span class="badge pink" style="margin-left:4px">관리자</span>':''}</div><div class="lsub">${esc(m.email)}</div></div>
   ${session.isAdmin?`<button class="btn ghost sm" onclick="toggleAdmin('${e}')">${adm?'관리자 해제':'관리자 지정'}</button><button class="btn ghost sm" onclick="removeMember('${e}')">삭제</button>`:''}</div>`;}).join('');}
function refreshAccessArrays(){accessCache.emails=accessCache.members.map(m=>(m.email||'').toLowerCase());accessCache.admins=accessCache.members.filter(m=>m.admin).map(m=>(m.email||'').toLowerCase());session.isAdmin=accessCache.admins.includes(session.email);}
function saveAccess(){refreshAccessArrays();return ACCESS_DOC.set(accessCache);}
function addMember(){const name=document.getElementById('am_name').value.trim();const email=document.getElementById('am_email').value.trim().toLowerCase();
 if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){toast('올바른 이메일을 입력하세요.');return;}
 if(accessCache.members.some(m=>(m.email||'').toLowerCase()===email)){toast('이미 명단에 있는 계정입니다.');return;}
 accessCache.members.push({email,name:name||email,admin:false});
 saveAccess().then(()=>{log('edit','접근 명단',`${name||email} 추가`);save();renderSettings(document.getElementById('view'));toast('추가되었습니다.');}).catch(e=>toast('저장 오류: '+(e.code||e.message)));}
function removeMember(email){const m=accessCache.members.find(x=>(x.email||'').toLowerCase()===email.toLowerCase());if(!m)return;
 if(m.admin&&accessCache.members.filter(x=>x.admin).length<=1){toast('마지막 관리자는 삭제할 수 없습니다.');return;}
 if(!confirm(`'${m.name||m.email}'을(를) 명단에서 삭제할까요?`))return;
 accessCache.members=accessCache.members.filter(x=>(x.email||'').toLowerCase()!==email.toLowerCase());
 saveAccess().then(()=>{log('edit','접근 명단',`${m.name||m.email} 삭제`);save();renderSettings(document.getElementById('view'));toast('삭제되었습니다.');}).catch(e=>toast('저장 오류: '+(e.code||e.message)));}
function toggleAdmin(email){const m=accessCache.members.find(x=>(x.email||'').toLowerCase()===email.toLowerCase());if(!m)return;
 if(m.admin&&accessCache.members.filter(x=>x.admin).length<=1){toast('최소 1명의 관리자가 필요합니다.');return;}
 m.admin=!m.admin;
 saveAccess().then(()=>{log('edit','접근 명단',`${m.name||m.email} ${m.admin?'관리자 지정':'관리자 해제'}`);save();renderSettings(document.getElementById('view'));toast('변경되었습니다.');}).catch(e=>toast('저장 오류: '+(e.code||e.message)));}
function setToggle(key,val){state.settings[key]=val;save();toast('설정이 저장되었습니다.');}
function backupExport(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='신규입사자_백업_'+ymd(new Date())+'.json';a.click();toast('백업 파일이 저장되었습니다.');}
function backupImport(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!confirm('현재 데이터를 백업 파일 내용으로 덮어쓸까요?'))return;state=Object.assign({people:[],departments:[],contacts:[],logs:[],logFolders:[],tips:{},settings:{}},d);log('edit','데이터','백업 복원');save();toast('복원되었습니다.');go('home');}catch(e){toast('올바른 백업 파일이 아닙니다.');}};r.readAsText(f);}

/* ===== EXPORT ===== */
function openExport(){
 const dates=[...new Set(state.people.map(p=>p.joinDate).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
 const body=`
 <div class="field"><label>내보낼 범위</label><select id="ex_scope" onchange="exScopeChange()"><option value="all">전체 내용</option><option value="date">특정 입사일</option><option value="person">특정 사람</option></select></div>
 <div class="field hidden" id="ex_dateWrap"><label>입사일 선택</label><select id="ex_date">${dates.map(d=>`<option value="${d}">${d}</option>`).join('')}</select></div>
 <div class="field hidden" id="ex_personWrap"><label>사람 선택 (여러 명 가능)</label><select id="ex_person" multiple size="6" style="height:auto">${state.people.slice().sort((a,b)=>(b.joinDate||'').localeCompare(a.joinDate||'')).map(p=>`<option value="${p.id}">${esc(p.name)} (${esc(p.joinDate)})</option>`).join('')}</select></div>
 <div class="field"><label>내보낼 항목</label><select id="ex_cols"><option value="summary">요약 7개 컬럼 (이름·입사일·부서·직급/직책·인계자·조직장·비고)</option><option value="full">상세 전체 필드</option></select></div>
 <div class="chk"><label><input type="checkbox" id="ex_sensitive" checked>민감정보(연봉·계약외연봉·계좌번호) 포함</label></div>`;
 openModal('엑셀로 내보내기',body,`<button class="btn ghost" onclick="closeModal()">취소</button><button class="btn primary" onclick="doExport()">📥 엑셀 다운로드</button>`);
}
function exScopeChange(){const s=document.getElementById('ex_scope').value;document.getElementById('ex_dateWrap').classList.toggle('hidden',s!=='date');document.getElementById('ex_personWrap').classList.toggle('hidden',s!=='person');}
function doExport(){
 const scope=document.getElementById('ex_scope').value;let arr=state.people.slice();
 if(scope==='date'){const d=document.getElementById('ex_date').value;arr=arr.filter(p=>p.joinDate===d);}
 if(scope==='person'){const sel=[...document.getElementById('ex_person').selectedOptions].map(o=>o.value);arr=arr.filter(p=>sel.includes(p.id));}
 if(!arr.length){toast('내보낼 데이터가 없습니다.');return;}
 arr.sort((a,b)=>(b.joinDate||'').localeCompare(a.joinDate||''));
 const cols=document.getElementById('ex_cols').value;const sens=document.getElementById('ex_sensitive').checked;let rows;
 if(cols==='summary'){rows=arr.map(p=>({'이름':p.name,'입사일':p.joinDate,'부서':p.dept,'직급/직책':p.rank,'인계자':p.handover,'조직장':p.orgLead,'비고':p.note}));}
 else{rows=arr.map(p=>{const o={'이름':p.name,'입사일':p.joinDate,'부서':p.dept,'직급/직책':p.rank,'입사구분':p.joinType,'정규직여부':p.empStatus,'국적':p.nationality,'인계자':p.handover,'인계자이메일':p.handoverEmail,'조직장':p.orgLead,'조직장이메일':p.orgLeadEmail,'비고':p.note,'급여유형':p.payType,'건강보험피부양자':p.healthDependent,'은행':p.bank,'예금주':p.accountHolder,'혼인여부':p.marriage,'자녀유무':p.children,'최종학력':p.education,'학교/전공':p.school,'경력사항':p.career,'내부관리메모':p.internalMemo,'1차입력':p.firstDone?'완료':'','2차입력':p.secondDone?'완료':''};
   if(sens){o['연봉']=fmtSalary(p.salary,p);o['계약외연봉']=fmtSalary(p.extraSalary,p);o['계좌번호']=p.account;}return o;});}
 const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'신규입사자');
 XLSX.writeFile(wb,'신규입사자_'+ymd(new Date())+'.xlsx');closeModal();toast('엑셀 파일이 저장되었습니다.');
}

/* ===== MODAL CORE ===== */
function openModal(title,body,foot){closeModal();const bg=document.createElement('div');bg.className='modal-bg';bg.onclick=e=>{if(e.target===bg)closeModal();};
 bg.innerHTML=`<div class="modal"><div class="modal-head"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-body">${body}</div>${foot?`<div class="modal-foot">${foot}</div>`:''}</div>`;
 document.body.appendChild(bg);document._modal=bg;}
function closeModal(){if(document._modal){document._modal.remove();document._modal=null;}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* 초기화는 auth.onAuthStateChanged 리스너가 담당 */
</script>
</body>
